services:
  weather-api:
    build: .
    container_name: infotecs_weather
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - weather-db:/app/db
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - weather-api
    networks:
      - app-network

volumes:
  weather-db:

networks:
  app-network: